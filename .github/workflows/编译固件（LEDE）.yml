name: 编译固件（LEDE）

on:
  repository_dispatch:
  workflow_dispatch:

  schedule:
    - cron: 0 16 * * 4

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: LEDE/feeds.conf.default
  CONFIG_FILE: LEDE/.config-full
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: LEDE/diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 创建编译空间挂载点
      run: |
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
    - name: 创建虚拟内存
      run: |
        # 先清理可能存在的旧swap文件
        sudo swapoff -a 2>/dev/null || true
        sudo rm -f /mnt/swapfile /swapfile 2>/dev/null || true
        
        # 创建新的swap文件
        sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
        sudo chmod 600 /mnt/swapfile
        sudo mkswap /mnt/swapfile
        sudo swapon /mnt/swapfile
        free -h | grep -i swap

    - name: 创建模拟物理磁盘
      run: |
        mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
        sudo truncate -s "${mnt_size}"G /mnt/mnt.img
        sudo truncate -s "${root_size}"G /root.img
        sudo losetup /dev/loop6 /mnt/mnt.img
        sudo losetup /dev/loop7 /root.img
        sudo pvcreate /dev/loop6
        sudo pvcreate /dev/loop7
        sudo vgcreate github /dev/loop6 /dev/loop7
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs /dev/github/runner
        sudo mkdir -p /workdir
        sudo mount /dev/github/runner /workdir
        sudo chown -R runner.runner /workdir
        df -Th
          
    - name: 检查Actions
      uses: actions/checkout@v4
    
    - name: 检查服务器配置
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo "云编译建议取消勾选Node.js及其相关插件！"
        echo "已知CPU型号（降序）：8370C,8272CL,8171M,E5系列"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo -e "CPU核心及版本信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        sudo lshw -short -C memory | grep GiB
        echo -e "\n"
        echo "--------------------------硬盘信息--------------------------"
        echo -e  "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
        echo "硬盘详情："
        df -Th

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 清理系统资源
        sudo swapoff -a
        sudo rm -f /swapfile /mnt/swapfile
        sudo docker image prune -a -f
        sudo systemctl stop docker
        sudo snap set system refresh.retain=2
        sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android 2>/dev/null
        sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
        sudo -E apt-get -qq purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
        
        # 安装依赖
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://tinyurl.com/ubuntu2204-make-openwrt)
        sudo -E apt-get -qq install libfuse-dev lib32z1-dev libpcre3 libpcre3-dev clang
        sudo -E apt-get -qq autoremove --purge
        sudo -E systemctl daemon-reload
        sudo -E apt-get -qq clean && sudo -E apt-get -qq autoclean
        sudo timedatectl set-timezone "$TZ"
        echo "硬盘详情："
        df -Th

    - name: 克隆源码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        useVersionInfo=$(git show -s --date=short --format="Author: %an<br/>date: %cd<br/>commit: %s<br/>commit hash: %H")
        echo "useVersionInfo=$useVersionInfo" >> $GITHUB_ENV
        echo "DATE=$(date "+%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "DATE1=$(date "+%Y-%m-%d")" >> $GITHUB_ENV

    - name: 缓存依赖项
      uses: actions/cache@v4
      with:
        path: |
          /workdir/openwrt/.ccache
          /workdir/openwrt/staging_dir
        key: ${{ runner.os }}-${{ hashFiles('**/repo_flag') }}-${{ env.DATE }}
        restore-keys: |
          ${{ runner.os }}-${{ hashFiles('**/repo_flag') }}-

    - name: 刷新缓存
      run: |
        if [ -d "/workdir/openwrt/staging_dir" ]; then
          find "/workdir/openwrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: 加载自定义feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        echo "硬盘详情："
        df -Th

    - name: 检查编译配置
      run: |
        cd openwrt
        echo "编译前配置检查："
        echo "目标架构："
        grep "^CONFIG_TARGET" .config | head -10
        echo "设备配置："
        grep "^CONFIG_TARGET.*DEVICE" .config
        echo "固件类型："
        grep "^CONFIG_TARGET_IMAGES" .config
        
        # 强制确保armvirt架构
        echo "强制设置armvirt架构..."
        sed -i 's/^# CONFIG_TARGET_armvirt is not set/CONFIG_TARGET_armvirt=y/' .config
        sed -i 's/^# CONFIG_TARGET_armvirt_64 is not set/CONFIG_TARGET_armvirt_64=y/' .config
        sed -i 's/^# CONFIG_TARGET_armvirt_64_DEVICE_generic is not set/CONFIG_TARGET_armvirt_64_DEVICE_generic=y/' .config
        
        # 禁用x86架构
        sed -i 's/^CONFIG_TARGET_x86=y/# CONFIG_TARGET_x86 is not set/' .config
        sed -i 's/^CONFIG_TARGET_x86_64=y/# CONFIG_TARGET_x86_64 is not set/' .config
        
        echo "修复后配置检查："
        grep "^CONFIG_TARGET" .config | head -10
        
    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        
        # 编译后检查输出文件
        echo "编译完成，检查输出文件："
        echo "bin目录结构："
        find bin -type d 2>/dev/null | head -10
        echo "所有固件文件："
        find bin -type f \( -name "*.tar.gz" -o -name "*.img" -o -name "*.bin" -o -name "*.zip" -o -name "*.gz" \) 2>/dev/null
        echo "targets目录内容："
        ls -la bin/targets/ 2>/dev/null || echo "targets目录不存在"

    - name: 清理服务器空间
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/
        # 清理编译过程中的临时文件，保留bin目录
        rm -rf $(ls . | grep -v "^bin$" | xargs) 2>/dev/null
        df -hT ${PWD}

    - name: 整理文件
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        # 检查实际的输出目录结构
        echo "检查bin目录结构："
        find $GITHUB_WORKSPACE/openwrt/bin -type d 2>/dev/null | head -20
        
        # 查找armvirt相关的目录
        echo "查找armvirt相关目录："
        find $GITHUB_WORKSPACE/openwrt/bin -name "*armvirt*" -o -name "*arm*" 2>/dev/null
        
        # 查找所有可能的固件文件
        echo "查找所有固件文件："
        find $GITHUB_WORKSPACE/openwrt/bin -type f \( -name "*.tar.gz" -o -name "*.img" -o -name "*.bin" -o -name "*.zip" -o -name "*.gz" \) 2>/dev/null
        
        # 尝试找到正确的目标目录
        TARGET_DIR=$(find $GITHUB_WORKSPACE/openwrt/bin/targets -type d -name "*armvirt*" 2>/dev/null | head -1)
        if [ -z "$TARGET_DIR" ]; then
            TARGET_DIR=$(find $GITHUB_WORKSPACE/openwrt/bin/targets -type d 2>/dev/null | head -1)
        fi
        
        if [ -n "$TARGET_DIR" ]; then
            echo "使用目标目录: $TARGET_DIR"
            cd $TARGET_DIR
            echo "FIRMWARE=$PWD" >> $GITHUB_ENV
            echo "status=success" >> ${GITHUB_OUTPUT}
            
            # 检查目标目录内容
            echo "目标目录内容："
            ls -la $PWD/
        else
            echo "未找到目标目录，使用默认处理"
            echo "status=failed" >> ${GITHUB_OUTPUT}
        fi
        
        echo -e "\n"
        echo "列出空间占用前10的目录或文件："
        sudo du -h --max-depth=1 /workdir |sort -nr | head -10
        rm -rf /workdir/openwrt/ && sync
        echo -e "\n"
        echo "清理之后："
        df -hT
        echo -e "\n"
        echo "/workdir路径文件"
        ls -l /workdir/
        echo -e "\n"
        echo "列出空间占用前10的目录或文件："
        sudo du -h --max-depth=1 /workdir |sort -nr | head -10

    - name: 打包内核
      uses: unifreq/openwrt_packit@master
      env:
        WHOAMI: deng
        OPENWRT_ARMVIRT: ${{ env.FIRMWARE }}/*.tar.gz
        PACKAGE_SOC: s905d
        KERNEL_AUTO_LATEST: true
        KERNEL_VERSION_NAME: 5.15.105_6.6.1
        
    - name: 整理文件
      run: |
        mkdir -p /workdir/upload
        mv /opt/openwrt_packit/output/* /workdir/upload/
        echo "最终输出文件："
        ls -la /workdir/upload/
      
    - name: 发布固件
      uses: ncipollo/release-action@v1
      with:
        tag: openwrt_armvirt_v8_${{ env.PACKAGED_OUTPUTDATE }}
        artifacts: /workdir/upload/*
        allowUpdates: true
        token: ${{ secrets.GB_TOKEN }}
        body: |
          ### **适用于Amlogic平台的N1盒子OpenWrt固件--全插件**
          * **固件信息：**
          默认IP: `192.168.1.10`
          默认用户名: `root`
          默认密码: `password`
          * **使用方法：**
          1. 安装固件：写入U盘直接使用；U盘启动后可输入命令 `openwrt-install-amlogic` 按照英文提示写入到emmc
          2. 更新固件：将固件放在 `/mnt/mmcblk2p4/` 目录下，输入命令 `openwrt-update-amlogic` 可直接更新
          3. 登录Luci界面后，可直接使用`晶晨宝盒`插件进行写入emmc或者更新操作（使用前先按需求填写好插件设置），免去手动输入命令！
          * **更新说明：**
          目前已集成大部分常用插件！
          * **提示：**
          `openwrt_s905d_n1_XX_XX` 文件名才是固件！

    - name: 清理Actions空间
      uses: Mattraks/delete-workflow-runs@main
      with:
          token: ${{ secrets.GITHUB_TOKEN }}
          仓库: ${{ github.repository }}
          keep_minimum_runs: 0
          retain_days: 7
          #retain_days: ${{ github.event.inputs.action_days }}
    
    - name: 删除多余releases
      uses: dev-drprasad/delete-older-releases@master
      with:
        repo: ${{ github.repository }}
        keep_latest: 6
        #keep_latest: ${{ github.event.inputs.rele }}
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GB_TOKEN }}
